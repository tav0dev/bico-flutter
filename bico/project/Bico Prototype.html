<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bicco — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, -apple-system, sans-serif; background: #f0eee9; }
  #root { width: 100%; height: 100%; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-tokens.jsx"></script>
<script type="text/babel" src="phone-frame.jsx"></script>
<script type="text/babel" src="shared-ui.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "accent": "green",
  "density": "comfortable",
  "navStyle": "icons-labels",
  "cardStyle": "soft",
  "tucoMode": "placeholder"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <ThemeProvider tweaks={t}>
      <DesignCanvas>
        <DCSection id="auth" title="Acesso" subtitle="Login e cadastro">
          <DCArtboard id="login" label="Login / Cadastro" width={360} height={760}>
            <ScreenLogin />
          </DCArtboard>
          <DCArtboard id="onboarding" label="Onboarding · passo 3 de 4" width={360} height={760}>
            <ScreenOnboarding />
          </DCArtboard>
        </DCSection>

        <DCSection id="daily" title="Dia a dia" subtitle="Início e produtividade">
          <DCArtboard id="dashboard" label="Início" width={360} height={760}>
            <ScreenDashboard />
          </DCArtboard>
          <DCArtboard id="agenda" label="Agenda · semana" width={360} height={760}>
            <ScreenAgenda />
          </DCArtboard>
        </DCSection>

        <DCSection id="comms" title="Conversas e clientes" subtitle="WhatsApp + Instagram unificados">
          <DCArtboard id="inbox" label="Inbox" width={360} height={760}>
            <ScreenInbox />
          </DCArtboard>
          <DCArtboard id="thread" label="Conversa · sugestões IA" width={360} height={760}>
            <ScreenInboxThread />
          </DCArtboard>
          <DCArtboard id="clients" label="Clientes" width={360} height={760}>
            <ScreenClients />
          </DCArtboard>
        </DCSection>

        <DCSection id="catalog" title="Catálogo e marketing" subtitle="Serviços e divulgação">
          <DCArtboard id="services" label="Serviços" width={360} height={760}>
            <ScreenServices />
          </DCArtboard>
          <DCArtboard id="post" label="Criar post · IA" width={360} height={760}>
            <ScreenCreatePost />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Tema" />
        <TweakToggle label="Modo escuro" value={t.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakRadio label="Cor principal" value={t.accent}
          options={[{value:'green',label:'Verde'},{value:'purple',label:'Roxo'}]}
          onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Densidade" value={t.density}
          options={[{value:'compact',label:'Compacta'},{value:'comfortable',label:'Confortável'}]}
          onChange={(v) => setTweak('density', v)} />
        <TweakRadio label="Cartões" value={t.cardStyle}
          options={[{value:'flat',label:'Flat'},{value:'soft',label:'Soft'},{value:'outlined',label:'Outline'}]}
          onChange={(v) => setTweak('cardStyle', v)} />
        <TweakSelect label="Bottom nav" value={t.navStyle}
          options={[
            {value:'icons-labels',label:'Ícones + rótulos'},
            {value:'icons-only',label:'Só ícones'},
            {value:'fab-centered',label:'FAB central'},
          ]}
          onChange={(v) => setTweak('navStyle', v)} />

        <TweakSection label="Mascote" />
        <TweakRadio label="Tuco" value={t.tucoMode}
          options={[{value:'simple',label:'Geométrico'},{value:'placeholder',label:'Slot'},{value:'hidden',label:'Oculto'}]}
          onChange={(v) => setTweak('tucoMode', v)} />
      </TweaksPanel>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
